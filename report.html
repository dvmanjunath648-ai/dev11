<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Report an Animal | Street Animal Rescue</title>
  <link rel="stylesheet" href="report.css">
</head>

<body>

  <!-- Header -->
  <header class="navbar">
    <div class="logo">Street Animal Rescue</div>
    <nav>
      <a href="index.html">Home</a>
      <a href="report.html" class="active">Report</a>
      <a href="#">Volunteer</a>
      <a href="#">Contact</a>
    </nav>
  </header>

  <!-- Main Section -->
  <section class="report-section">

    <!-- Left Info Panel -->
    <div class="report-info">
      <h1>Report an Injured or Stray Animal</h1>
      <p>
        Help us rescue animals in need. Fill out the form with
        accurate details and our rescue team will respond as soon as possible.
      </p>
      <div class="img">
        <svg xmlns="http://www.w3.org/2000/svg" width="104" height="80" fill="currentColor" viewBox="0 0 24 24">
          <!--Boxicons v3.0.8 https://boxicons.com | License  https://docs.boxicons.com/free-->
          <path
            d="M15 5c0-1.65-1.35-3-3-3S9 3.35 9 5s1.35 3 3 3 3-1.35 3-3m-4 0c0-.55.45-1 1-1s1 .45 1 1-.45 1-1 1-1-.45-1-1m8 0c-1.65 0-3 1.35-3 3s1.35 3 3 3 3-1.35 3-3-1.35-3-3-3m0 4c-.55 0-1-.45-1-1s.45-1 1-1 1 .45 1 1-.45 1-1 1M8 8c0-1.65-1.35-3-3-3S2 6.35 2 8s1.35 3 3 3 3-1.35 3-3M4 8c0-.55.45-1 1-1s1 .45 1 1-.45 1-1 1-1-.45-1-1m1.22 13.14c.81.53 1.74.8 2.68.8.67 0 1.33-.14 1.97-.41l.98-.43c.74-.32 1.59-.32 2.32 0l.98.43c1.52.67 3.25.52 4.64-.39a4.88 4.88 0 0 0 2.22-4.1c0-2.25-1.53-4.2-3.71-4.75-.51-.13-.97-.39-1.35-.76l-.48-.48c-1.91-1.91-5.02-1.91-6.92 0l-.48.48c-.37.37-.84.63-1.35.76-2.18.55-3.71 2.5-3.71 4.75 0 1.66.83 3.19 2.22 4.1Zm1.98-6.91c.86-.22 1.65-.66 2.27-1.29l.48-.48c.56-.56 1.31-.85 2.05-.85s1.48.28 2.05.85l.48.48c.63.63 1.41 1.07 2.28 1.29A2.89 2.89 0 0 1 19 17.04c0 1-.48 1.88-1.31 2.42s-1.83.63-2.75.23l-.98-.43a4.9 4.9 0 0 0-3.93 0l-.98.43c-.91.4-1.91.32-2.75-.23s-1.31-1.43-1.31-2.42c0-1.33.9-2.49 2.2-2.81Z">
          </path>
        </svg>
      </div>
      <div class="info-box">
        <h3>Emergency?</h3>
        <p>Call: +91 98765 43210</p>
      </div>
    </div>

    <!-- Right Form Panel -->
    <div class="report-form-container">
      <form class="report-form">

        <div class="form-group">
          <label>Your Name</label>
          <input type="text" placeholder="Enter your full name" required>
        </div>

        <div class="form-group">
          <label>Phone Number</label>
          <input type="tel" placeholder="Enter phone number" required>
        </div>

        <div class="form-group">
          <label>Animal Type</label>
          <select required>
            <option value="">Select animal</option>
            <option>Dog</option>
            <option>Cat</option>
            <option>Cow</option>
            <option>Other</option>
          </select>
        </div>

        <div class="form-group">
          <label>Location</label>
          <input type="text" placeholder="Enter exact location" required>
        </div>

        <div class="form-group">
          <label>Describe the Condition</label>
          <textarea rows="4" placeholder="Injured, sick, trapped, etc..." required></textarea>
        </div>

        <div class="form-group">
          <label>Upload Image (Optional)</label>
          <input type="file">
        </div>

        <button type="submit" class="submit-btn">
          Submit Report
        </button>

      </form>
    </div>

  </section>


</body>

</html>
